<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>Teams Capture Pro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&display=swap');
    :root { --bg:#0a0a0f; --surface:#13131c; --border:#1e1e2e;
            --accent:#5865f2; --text:#e8e8f0; --muted:#6b6b8a; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { width:280px; background:var(--bg); color:var(--text);
           font-family:'IBM Plex Sans',sans-serif; font-size:13px; }
    .header { background:var(--surface); border-bottom:1px solid var(--border);
              padding:14px 16px; display:flex; align-items:center; gap:10px; }
    .logo { width:28px;height:28px; background:linear-gradient(135deg,var(--accent),#8b5cf6);
            border-radius:6px; display:flex;align-items:center;justify-content:center; font-size:14px; }
    .header-text h1 { font-size:13px; font-weight:600; }
    .header-text p  { font-size:10px; color:var(--muted); font-family:'IBM Plex Mono',monospace; margin-top:1px; }
    .body { padding:16px; display:flex; flex-direction:column; gap:10px; }
    .info { background:var(--surface); border:1px solid var(--border); border-radius:8px;
            padding:12px; font-size:12px; line-height:1.6; color:var(--muted); }
    .info strong { color:var(--text); }
    .btn { width:100%; padding:10px; border:none; border-radius:8px;
           background:var(--accent); color:#fff; font-size:13px; font-weight:600;
           cursor:pointer; font-family:'IBM Plex Sans',sans-serif; transition:background .15s; }
    .btn:hover { background:#6c75f5; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">◉</div>
    <div class="header-text">
      <h1>Teams Capture Pro</h1>
      <p>participantes · áudio · ws</p>
    </div>
  </div>
  <div class="body">
    <div class="info">
      A janela do recorder abre <strong>automaticamente</strong> ao entrar em uma chamada.<br><br>
      Ou clique abaixo para abrir manualmente.
    </div>
    <button class="btn" id="btnOpen">Abrir Recorder</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
